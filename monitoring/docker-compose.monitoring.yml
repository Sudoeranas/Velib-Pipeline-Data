version: '3.8'

services:
  # Convertit les métriques StatsD d'Airflow en format Prometheus
  statsd-exporter:
    image: prom/statsd-exporter:latest
    ports:
      - "9102:9102"
      - "8125:8125/udp"
    networks:
      - velib-net

  # Collecte et stocke les métriques
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - velib-net

  # Métriques CPU/RAM/réseau des containers Docker
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - velib-net

  # Visualisation des métriques
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: velib2026
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - velib-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  velib-net:
    external: true
    name: velib-pipeline-data_default
