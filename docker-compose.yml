version: '3.8'

x-airflow-common: &airflow-common
  build: .
  image: velib-airflow:latest
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-changeme-in-production}
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: '10'
    PYTHONPATH: /opt/airflow/src
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/gcp-service-account.json
    # Envoi des métriques Airflow vers Prometheus via StatsD
    AIRFLOW__METRICS__STATSD_ON: 'true'
    AIRFLOW__METRICS__STATSD_HOST: ${MONITORING_VM_IP:-34.62.7.39}
    AIRFLOW__METRICS__STATSD_PORT: '8125'
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-ZZHNGGJ-MPB61332}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER:-DBT_USER}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-Velib2026!}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./credentials/gcp-service-account.json:/opt/airflow/credentials/gcp-service-account.json:ro
    - ./velib_dbt:/opt/airflow/velib_dbt
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Anas --lastname IKLI --role Admin --email msprmaster2@gmail.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: always

volumes:
  postgres_data:
