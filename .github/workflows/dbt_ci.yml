name: dbt CI

on:
  push:
    branches: [main]
    paths:
      - 'velib_dbt/**'
  pull_request:
    branches: [main]
    paths:
      - 'velib_dbt/**'

jobs:
  dbt-test:
    name: dbt run & test
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake==1.9.0 dbt-core==1.9.0

      - name: dbt debug
        working-directory: velib_dbt
        run: dbt debug --profiles-dir .

      - name: dbt run
        working-directory: velib_dbt
        run: dbt run --profiles-dir .

      - name: dbt test
        working-directory: velib_dbt
        run: dbt test --profiles-dir .
